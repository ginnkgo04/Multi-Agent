version: '3.9'
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: multi_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: ./apps/api
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/multi_agent
      API_CORS_ORIGINS: http://localhost:3000
      APP_DATA_DIR: /app/data
      RUN_ARTIFACT_DIR: /app/runs
    volumes:
      - ./data:/app/data
      - ./runs:/app/runs
    ports:
      - '8000:8000'
    depends_on:
      - postgres

  web:
    build:
      context: ./apps/web
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api
    ports:
      - '3000:3000'
    depends_on:
      - api

volumes:
  pgdata:
